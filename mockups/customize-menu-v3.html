<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crusaders30XX - Customize Menu V3</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black-1: #0a0a0a;
  --black-2: #1a1a1a;
  --black-3: #2a2a2a;
  --black-4: #333;
  --white-1: #ffffff;
  --white-2: #f0f0f0;
  --white-3: #e0e0e0;
  --red-1: #8b0000;
  --red-2: #a00000;
  --red-3: #c41e3a;
  --red-glow: rgba(196, 30, 58, 0.4);
  --transition-fast: 0.15s ease;
  --transition-med: 0.25s ease;
  --transition-slow: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--black-1);
  color: var(--white-2);
  overflow: hidden;
  height: 100vh;
  user-select: none;
}

h1, h2, h3, h4 { font-family: 'Oswald', sans-serif; }

/* ─── LAYOUT ─── */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ─── HEADER BAR ─── */
.header-bar {
  background: var(--black-2);
  padding: 0 24px;
  display: flex;
  justify-content: space-between;
  align-items: stretch;
  border-bottom: 2px solid var(--red-2);
  height: 56px;
  flex-shrink: 0;
  position: relative;
  z-index: 100;
}

.header-bar::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--red-glow), transparent);
}

.nav-tabs {
  display: flex;
  gap: 4px;
  align-items: stretch;
}

.nav-tab {
  padding: 0 36px;
  background: var(--black-3);
  color: var(--white-3);
  cursor: pointer;
  font-family: 'Oswald', sans-serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 2px;
  clip-path: polygon(12% 0, 100% 0, 88% 100%, 0 100%);
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 140px;
}

.nav-tab:hover {
  background: var(--black-4);
  color: var(--white-1);
}

.nav-tab.active {
  background: var(--red-2);
  color: var(--white-1);
}

.exit-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 28px;
  cursor: pointer;
  font-family: 'Oswald', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--white-3);
  transition: all var(--transition-fast);
  position: relative;
}

.exit-btn::before {
  content: '';
  position: absolute;
  left: 0;
  top: 25%;
  bottom: 25%;
  width: 1px;
  background: var(--black-4);
}

.exit-btn:hover {
  color: var(--red-3);
}

.exit-btn .key-hint {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  border: 1px solid var(--black-4);
  border-radius: 4px;
  font-size: 11px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  color: #666;
  background: var(--black-1);
}

/* ─── MAIN CONTENT ─── */
.main-content {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.page {
  display: none;
  height: 100%;
}

.page.active {
  display: flex;
}

/* ════════════════════════════════════════════════
   LOADOUT PAGE
   ════════════════════════════════════════════════ */
.loadout-page {
  position: relative;
}

.loadout-page::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 50%, rgba(160, 0, 0, 0.03) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.008) 40px, rgba(255,255,255,0.008) 41px);
  pointer-events: none;
}

/* ─── WHEEL CONTAINER ─── */
.wheel-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding-right: 240px;
}

.wheel {
  width: 540px;
  height: 540px;
  position: relative;
  flex-shrink: 0;
}

/* Decorative rings */
.wheel::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 440px;
  height: 440px;
  border-radius: 50%;
  border: 1px solid rgba(160, 0, 0, 0.15);
  pointer-events: none;
}

.wheel::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 310px;
  height: 310px;
  border-radius: 50%;
  border: 1px dashed rgba(255, 255, 255, 0.04);
  pointer-events: none;
}

/* ─── CENTER HUB (tooltip display area) ─── */
.wheel-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 260px;
  height: 260px;
  background: var(--black-2);
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 3px solid var(--red-2);
  z-index: 10;
  transition: all var(--transition-med);
  box-shadow:
    0 0 30px rgba(160, 0, 0, 0.2),
    inset 0 0 20px rgba(0, 0, 0, 0.5);
  overflow: hidden;
}

.wheel-center.has-hover {
  border-color: var(--red-3);
  box-shadow:
    0 0 40px rgba(196, 30, 58, 0.3),
    inset 0 0 20px rgba(0, 0, 0, 0.5);
}

/* Idle state - decorative flair */
.center-idle {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  position: relative;
  transition: opacity var(--transition-med);
}

.center-idle .idle-ring {
  width: 110px;
  height: 110px;
  border: 2px solid rgba(160, 0, 0, 0.2);
  border-radius: 50%;
  position: absolute;
  animation: idle-rotate 12s linear infinite;
}

.center-idle .idle-ring-2 {
  width: 85px;
  height: 85px;
  border: 1px solid rgba(160, 0, 0, 0.12);
  border-top-color: rgba(196, 30, 58, 0.3);
  border-radius: 50%;
  position: absolute;
  animation: idle-rotate 8s linear infinite reverse;
}

.center-idle .idle-dot {
  width: 8px;
  height: 8px;
  background: var(--red-2);
  border-radius: 50%;
  box-shadow: 0 0 12px rgba(196, 30, 58, 0.5);
  animation: idle-pulse 3s ease-in-out infinite;
}

@keyframes idle-rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes idle-pulse {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.3); }
}

/* Active tooltip state (circle menu) */
.center-tooltip {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  padding: 24px;
  text-align: center;
  opacity: 0;
  transition: opacity var(--transition-med);
}

.center-tooltip.visible {
  display: flex;
  opacity: 1;
}

.center-tooltip .ct-slot-label {
  font-family: 'Oswald', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--red-3);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.center-tooltip .ct-item-name {
  font-family: 'Oswald', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--white-1);
  line-height: 1.15;
  margin-bottom: 4px;
}

.center-tooltip .ct-item-stat {
  font-size: 14px;
  font-weight: 600;
  color: var(--red-3);
  margin-bottom: 6px;
}

.center-tooltip .ct-item-desc {
  font-size: 12px;
  color: #888;
  line-height: 1.35;
  font-style: italic;
  max-width: 195px;
}

.center-tooltip .ct-nav {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
}

.center-tooltip .ct-nav-arrow {
  font-size: 16px;
  color: #555;
  cursor: pointer;
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--black-4);
  border-radius: 50%;
  background: var(--black-1);
  transition: all var(--transition-fast);
}

.center-tooltip .ct-nav-arrow:hover {
  color: var(--red-3);
  border-color: var(--red-2);
}

.center-tooltip .ct-nav-count {
  font-family: 'Oswald', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: #666;
  letter-spacing: 1px;
}

.center-tooltip .ct-equipped-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--red-3);
  text-transform: uppercase;
  padding: 1px 5px;
  border: 1px solid rgba(196, 30, 58, 0.3);
  border-radius: 2px;
  margin-top: 2px;
}

/* ─── CONNECTOR CHEVRON (from segment toward center) ─── */
.connector-arrow {
  position: absolute;
  pointer-events: none;
  z-index: 5;
  opacity: 0;
  transition: opacity var(--transition-med);
}

.connector-arrow.visible {
  opacity: 1;
}

/* ─── WHEEL SEGMENTS ─── */
.segment {
  position: absolute;
  padding: 12px 16px;
  background: var(--black-3);
  cursor: pointer;
  transition: all var(--transition-med);
  border: 2px solid var(--black-4);
  text-align: center;
  min-width: 120px;
  clip-path: polygon(8% 0, 100% 0, 92% 100%, 0 100%);
}

.segment:hover,
.segment.hovered {
  background: var(--black-2);
  border-color: var(--red-2);
  box-shadow: 0 0 20px rgba(160, 0, 0, 0.25);
}

.segment.active-slot {
  background: var(--red-2);
  border-color: var(--red-3);
  box-shadow: 0 0 25px rgba(196, 30, 58, 0.4);
}

.segment .seg-label {
  font-family: 'Oswald', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  color: #888;
  text-transform: uppercase;
  margin-bottom: 3px;
}

.segment.active-slot .seg-label,
.segment.hovered .seg-label {
  color: rgba(255, 255, 255, 0.7);
}

.segment .seg-item {
  font-family: 'Oswald', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--white-1);
  white-space: nowrap;
}

/* Segment positions */
.seg-n   { top: -10px;  left: 50%; transform: translateX(-50%); }
.seg-ne  { top: 55px;   right: -15px; }
.seg-e   { top: 50%;    right: -30px; transform: translateY(-50%); }
.seg-se  { bottom: 55px; right: -15px; }
.seg-s   { bottom: -10px; left: 50%; transform: translateX(-50%); }
.seg-sw  { bottom: 55px; left: -15px; }
.seg-w   { top: 50%;    left: -30px; transform: translateY(-50%); }
.seg-nw  { top: 55px;   left: -15px; }

/* ─── EQUIPPED OVERVIEW PANEL (right side) ─── */
.equipped-panel {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 240px;
  background: var(--black-2);
  border-left: 1px solid var(--black-4);
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  z-index: 5;
}

.equipped-panel-title {
  font-family: 'Oswald', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 3px;
  color: #666;
  text-transform: uppercase;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--black-4);
}

.eq-slot {
  padding: 8px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.03);
  transition: all var(--transition-fast);
}

.eq-slot.highlighted {
  background: rgba(160, 0, 0, 0.08);
  margin: 0 -20px;
  padding: 8px 20px;
  border-left: 2px solid var(--red-3);
}

.eq-slot-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  color: #555;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.eq-slot-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.eq-slot-name {
  font-weight: 700;
  font-size: 14px;
  color: var(--white-2);
}

.eq-slot-stat {
  font-size: 12px;
  font-weight: 600;
  color: var(--red-3);
}

/* ════════════════════════════════════════════════
   DECK PAGE
   ════════════════════════════════════════════════ */
.deck-page {
  flex-direction: column;
}

.deck-stats-bar {
  background: var(--black-2);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  gap: 28px;
  border-bottom: 1px solid var(--black-4);
  flex-shrink: 0;
}

.deck-count {
  font-family: 'Oswald', sans-serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--white-1);
  letter-spacing: 1px;
}

.deck-count span {
  color: #555;
  font-size: 20px;
}

.color-breakdown {
  display: flex;
  gap: 16px;
  align-items: center;
}

.color-stat {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
  font-size: 15px;
}

.color-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
}

.deck-label {
  font-family: 'Oswald', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  color: #555;
  text-transform: uppercase;
}

.deck-main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Available Cards (Left) */
.deck-available {
  flex: 1;
  padding: 24px 28px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.section-title {
  font-family: 'Oswald', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--white-1);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--black-4);
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.card-item {
  background: var(--black-3);
  padding: 14px;
  border-radius: 3px;
  cursor: pointer;
  transition: all var(--transition-med);
  border: 2px solid transparent;
  position: relative;
}

.card-item:hover {
  border-color: var(--red-2);
  background: var(--black-2);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
}

.card-item.added {
  border-color: #4caf50;
  background: rgba(76, 175, 80, 0.05);
}

.card-item .card-name {
  font-weight: 700;
  font-size: 15px;
  margin-bottom: 6px;
  color: var(--white-1);
}

.card-item .card-cost {
  margin-bottom: 6px;
  display: flex;
  gap: 3px;
}

.card-item .card-type {
  font-size: 11px;
  color: #777;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.cost-pip {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
}

.pip-w { background: #e0e0e0; }
.pip-r { background: #a00000; }
.pip-b { background: #333; border-color: #555; }
.pip-any { background: #888; }

/* Cost pips inside center tooltip */
.center-tooltip .cost-pip {
  width: 14px;
  height: 14px;
  vertical-align: middle;
  margin: 0 1px;
}

.center-tooltip .ct-item-stat .color-indicator {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  vertical-align: middle;
  margin: 0 3px;
  border: 1px solid rgba(255,255,255,0.15);
}

.center-tooltip .ct-item-stat .ability-tag {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  opacity: 0.7;
}

/* Current Deck (Right) */
.deck-current {
  width: 380px;
  background: var(--black-2);
  border-left: 1px solid var(--black-4);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.deck-current-header {
  padding: 24px 20px 0 20px;
  flex-shrink: 0;
}

.deck-current-header .section-title {
  font-size: 16px;
  margin-bottom: 16px;
}

.deck-current-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 0 20px 24px 20px;
}

.deck-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

/* Individual card instances (no more x3 grouping) */
.deck-card-instance {
  background: var(--black-3);
  border-radius: 3px;
  border-left: 3px solid var(--red-2);
  padding: 8px 14px;
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  justify-content: space-between;
  animation: fade-in 0.2s ease forwards;
}

.deck-card-instance:hover {
  background: var(--black-1);
  transform: translateX(-4px);
}

.deck-card-instance.removing {
  opacity: 0.5;
  transform: translateX(-10px);
}

/* Visual grouping: first in group gets more top margin, reduced gap between siblings */
.deck-card-instance.group-first {
  margin-top: 8px;
  border-radius: 3px 3px 1px 1px;
}

.deck-card-instance.group-middle {
  border-radius: 0;
  margin-top: 0;
  border-top: 1px solid rgba(160, 0, 0, 0.08);
  opacity: 0.92;
}

.deck-card-instance.group-last {
  border-radius: 1px 1px 3px 3px;
  margin-top: 0;
  border-top: 1px solid rgba(160, 0, 0, 0.08);
  opacity: 0.92;
}

.deck-card-instance.group-single {
  margin-top: 8px;
}

.dci-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.dci-pips {
  display: flex;
  gap: 3px;
}

.dci-name {
  font-weight: 700;
  font-size: 14px;
  color: var(--white-1);
}

.dci-type {
  font-size: 10px;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--black-1); }
::-webkit-scrollbar-thumb { background: var(--black-4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #555; }

/* ─── Animations ─── */
@keyframes fade-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes equip-flash {
  0% { background: rgba(196, 30, 58, 0.3); }
  100% { background: transparent; }
}

.segment.just-equipped {
  animation: equip-flash 0.5s ease;
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 20px rgba(160, 0, 0, 0.2); }
  50% { box-shadow: 0 0 30px rgba(196, 30, 58, 0.35); }
}
</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <div class="header-bar">
    <div class="nav-tabs">
      <div class="nav-tab" data-page="deck">DECK</div>
      <div class="nav-tab active" data-page="loadout">LOADOUT</div>
    </div>
    <div class="exit-btn" id="exitBtn">
      <span class="key-hint">ESC</span>
      EXIT
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <!-- ═══ LOADOUT PAGE ═══ -->
    <div class="page loadout-page active" id="page-loadout">
      <div class="wheel-container">
        <div class="wheel" id="wheel">
          <!-- Center Hub -->
          <div class="wheel-center" id="wheelCenter">
            <!-- Idle state (visible when nothing hovered) -->
            <div class="center-idle" id="centerIdle">
              <div class="idle-ring"></div>
              <div class="idle-ring-2"></div>
              <div class="idle-dot"></div>
            </div>
            <!-- Tooltip state (visible when hovering a segment) -->
            <div class="center-tooltip" id="centerTooltip">
              <div class="ct-slot-label" id="ctSlotLabel"></div>
              <div class="ct-item-name" id="ctItemName"></div>
              <div class="ct-item-stat" id="ctItemStat"></div>
              <div class="ct-item-desc" id="ctItemDesc"></div>
              <div class="ct-equipped-badge" id="ctEquippedBadge" style="display:none;">EQUIPPED</div>
              <div class="ct-nav">
                <div class="ct-nav-arrow" id="ctPrev">&#9664;</div>
                <div class="ct-nav-count" id="ctNavCount"></div>
                <div class="ct-nav-arrow" id="ctNext">&#9654;</div>
              </div>
            </div>
          </div>

          <!-- Connector chevron SVG overlay -->
          <svg class="connector-arrow" id="connectorArrow" width="540" height="540" style="position:absolute;top:0;left:0;pointer-events:none;z-index:8;">
            <polygon id="chevronShape" points="0,0 0,0 0,0" fill="rgba(196,30,58,0.55)" />
          </svg>

          <!-- Segments generated by JS -->
        </div>
      </div>

      <!-- Equipped Overview Panel -->
      <div class="equipped-panel" id="equippedPanel">
        <div class="equipped-panel-title">EQUIPPED</div>
      </div>
    </div>

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════

function init() {
  buildWheel();
  buildEquippedPanel();
  buildDeckPage();

// ─── NAV TABS ───
function bindNavTabs() {
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`page-${tab.dataset.page}`).classList.add('active');
      if (tab.dataset.page === 'loadout') clearHover();
    });
  });
}

// ─── BUILD WHEEL ───
function buildWheel() {
  const wheel = document.getElementById('wheel');

  // For medal3, we need a special position since 'n' is taken by weapon
  // Let's recalculate positions for 8 segments evenly
  const slotKeys = Object.keys(SLOTS);

  // Custom angle-based positions for 8 slots on a circle
  const positions = {
    weapon:     { angle: 270, radius: 210 }, // top
    head:       { angle: 315, radius: 210 }, // top-right
    chest:      { angle: 0,   radius: 210 }, // right
    arms:       { angle: 45,  radius: 210 }, // bottom-right
    legs:       { angle: 90,  radius: 210 }, // bottom
    temperance: { angle: 135, radius: 210 }, // bottom-left
    medal1:     { angle: 180, radius: 210 }, // left
    medal2:     { angle: 225, radius: 210 }, // top-left
    medal3:     { angle: 252, radius: 210 }, // near top-left (unused, see below)
  };

  // Actually let's use 8 evenly spaced slots (drop medal3 since we have 8 slots for 8 positions)
  // weapon, head, chest, arms, legs, temperance, medal1, medal2, medal3 = 9 slots
  // Let's space 9 slots evenly: 360/9 = 40 degrees each
  const angleStep = 360 / slotKeys.length;
  const startAngle = 270; // top
  const radius = 235;
  const centerX = 270;
  const centerY = 270;

  slotKeys.forEach((key, i) => {
    const slot = SLOTS[key];
    const equipped = EQUIPMENT[key].find(it => it.equipped);
    const angleDeg = startAngle + i * angleStep;
    const angleRad = (angleDeg * Math.PI) / 180;

    const x = centerX + radius * Math.cos(angleRad);
    const y = centerY + radius * Math.sin(angleRad);

    const seg = document.createElement('div');
    seg.className = 'segment';
    seg.dataset.slot = key;
    seg.dataset.angle = angleDeg;
    seg.style.position = 'absolute';
    seg.style.left = `${x}px`;
    seg.style.top = `${y}px`;
    seg.style.transform = 'translate(-50%, -50%)';
    seg.innerHTML = `
      <div class="seg-label">${slot.label}</div>
      <div class="seg-item">${equipped ? (equipped.shortName || equipped.name) : '—'}</div>
    `;
    wheel.appendChild(seg);

    // Hover events - tooltip shows on hover
    seg.addEventListener('mouseenter', () => onSegmentHover(key));
    seg.addEventListener('mouseleave', () => onSegmentLeave(key));

    // Click to equip current browsed item
    seg.addEventListener('click', (e) => {
      e.stopPropagation();
      if (hoveredSlot === key) {
        equipItem(key, browseIndex[key]);
      }
    });
  });
}

// ─── SEGMENT HOVER ───
function onSegmentHover(slotKey) {
  hoveredSlot = slotKey;

  // Highlight segment
  document.querySelectorAll('.segment').forEach(s => s.classList.remove('hovered'));
  const seg = document.querySelector(`.segment[data-slot="${slotKey}"]`);
  seg.classList.add('hovered');

  // Show center tooltip
  const center = document.getElementById('wheelCenter');
  center.classList.add('has-hover');
  document.getElementById('centerIdle').style.display = 'none';
  const tooltip = document.getElementById('centerTooltip');
  tooltip.classList.add('visible');

  updateCenterTooltip(slotKey);
  updateConnectorArrow(slotKey);

  // Highlight equipped panel
  const eqSlots = document.querySelectorAll(`.eq-slot[data-slot="${slotKey}"]`);
  eqSlots.forEach(s => s.classList.add('highlighted'));
}

function onSegmentLeave(slotKey) {
  hoveredSlot = null;

  const seg = document.querySelector(`.segment[data-slot="${slotKey}"]`);
  seg.classList.remove('hovered');

  // Hide tooltip, show idle
  const center = document.getElementById('wheelCenter');
  center.classList.remove('has-hover');
  document.getElementById('centerIdle').style.display = 'flex';
  document.getElementById('centerTooltip').classList.remove('visible');

  // Hide connector
  document.getElementById('connectorArrow').classList.remove('visible');

  // Unhighlight panel
  document.querySelectorAll('.eq-slot').forEach(s => s.classList.remove('highlighted'));
}

function clearHover() {
  if (hoveredSlot) onSegmentLeave(hoveredSlot);
  hoveredSlot = null;
}

// ─── TYPE-AWARE STAT FORMATTERS ───
const COLOR_HEX = { Red: '#a00000', Black: '#333', White: '#e0e0e0' };

function formatEquipmentStat(item) {
  const dotColor = COLOR_HEX[item.color] || '#888';
  const border = item.color === 'Black' ? 'border:1px solid #555;' : 'border:1px solid rgba(255,255,255,0.15);';
  let html = `BLK: ${item.block} &times;${item.blockUses} | <span class="color-indicator" style="background:${dotColor};${border}"></span> ${item.color}`;
  if (item.abilityType) {
    html += ` | <span class="ability-tag">${item.abilityType}</span>`;
  }
  return html;
}

function formatWeaponStat(item) {
  const pips = item.cost.map(c => `<span class="cost-pip pip-${c === 'any' ? 'any' : c}"></span>`).join('');
  return `DMG: ${item.damage}  ${pips}`;
}

function formatTemperanceStat(item) {
  return `Threshold: ${item.threshold}`;
}

function getEquippedStatText(item) {
  if (!item) return '';
  switch (item.type) {
    case 'equipment': return `BLK: ${item.block} ×${item.blockUses}`;
    case 'weapon':    return `DMG: ${item.damage}`;
    case 'temperance': return `Thr: ${item.threshold}`;
    case 'medal':     return '';
    default:          return '';
  }
}

// ─── CENTER TOOLTIP ───
function updateCenterTooltip(slotKey) {
  const items = EQUIPMENT[slotKey];
  const idx = browseIndex[slotKey];
  const item = items[idx];
  const slot = SLOTS[slotKey];

  // Format stat line based on item type
  let statHtml = '';
  let descText = '';
  switch (item.type) {
    case 'equipment':
      statHtml = formatEquipmentStat(item);
      descText = item.abilityText || '';
      break;
    case 'weapon':
      statHtml = formatWeaponStat(item);
      descText = item.effect || '';
      break;
    case 'temperance':
      statHtml = formatTemperanceStat(item);
      descText = item.effect || '';
      break;
    case 'medal':
      statHtml = '';
      descText = item.effect || '';
      break;
    default:
      statHtml = '';
      descText = '';
  }

  document.getElementById('ctSlotLabel').textContent = slot.label;
  document.getElementById('ctItemName').textContent = item.name;
  document.getElementById('ctItemStat').innerHTML = statHtml;
  document.getElementById('ctItemDesc').textContent = descText;
  document.getElementById('ctNavCount').textContent = `${idx + 1} / ${items.length}`;

  const badge = document.getElementById('ctEquippedBadge');
  if (item.equipped) {
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }
}

// ─── CENTER NAV BUTTONS ───
function bindCenterNav() {
  document.getElementById('ctPrev').addEventListener('click', (e) => {
    e.stopPropagation();
    if (!hoveredSlot) return;
    const items = EQUIPMENT[hoveredSlot];
    browseIndex[hoveredSlot] = (browseIndex[hoveredSlot] - 1 + items.length) % items.length;
    updateCenterTooltip(hoveredSlot);
  });

  document.getElementById('ctNext').addEventListener('click', (e) => {
    e.stopPropagation();
    if (!hoveredSlot) return;
    const items = EQUIPMENT[hoveredSlot];
    browseIndex[hoveredSlot] = (browseIndex[hoveredSlot] + 1) % items.length;
    updateCenterTooltip(hoveredSlot);
  });
}

// ─── CONNECTOR CHEVRON ───
function updateConnectorArrow(slotKey) {
  const seg = document.querySelector(`.segment[data-slot="${slotKey}"]`);
  const arrow = document.getElementById('connectorArrow');
  const chevron = document.getElementById('chevronShape');

  const wheelEl = document.getElementById('wheel');
  const wheelRect = wheelEl.getBoundingClientRect();
  const segRect = seg.getBoundingClientRect();

  // Segment center relative to wheel
  const sx = segRect.left + segRect.width / 2 - wheelRect.left;
  const sy = segRect.top + segRect.height / 2 - wheelRect.top;

  // Wheel center
  const cx = 270;
  const cy = 270;

  const dx = cx - sx;
  const dy = cy - sy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const nx = dx / dist;
  const ny = dy / dist;

  // Perpendicular for chevron width
  const px = -ny;
  const py = nx;

  // Chevron positioned between segment and center
  const tipX = cx - nx * 140;
  const tipY = cy - ny * 140;
  const tailDist = 22;
  const wingSpread = 12;

  // Two back points of the chevron
  const backX = tipX - nx * tailDist;
  const backY = tipY - ny * tailDist;
  const p1x = backX + px * wingSpread;
  const p1y = backY + py * wingSpread;
  const p2x = backX - px * wingSpread;
  const p2y = backY - py * wingSpread;

  chevron.setAttribute('points', `${tipX},${tipY} ${p1x},${p1y} ${p2x},${p2y}`);

  arrow.classList.add('visible');
}

// ─── KEYBOARD CONTROLS ───
function bindKeyboard() {
  document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();

    if (key === 'escape') {
      clearHover();
      return;
    }

    if (!hoveredSlot) return;

    const items = EQUIPMENT[hoveredSlot];

    if (key === 'a' || key === 'arrowleft') {
      e.preventDefault();
      browseIndex[hoveredSlot] = (browseIndex[hoveredSlot] - 1 + items.length) % items.length;
      updateCenterTooltip(hoveredSlot);
    }

    if (key === 'd' || key === 'arrowright') {
      e.preventDefault();
      browseIndex[hoveredSlot] = (browseIndex[hoveredSlot] + 1) % items.length;
      updateCenterTooltip(hoveredSlot);
    }

    if (key === ' ') {
      e.preventDefault();
      equipItem(hoveredSlot, browseIndex[hoveredSlot]);
    }
  });
}

function equipItem(slotKey, itemIndex) {
  const items = EQUIPMENT[slotKey];
  const slot = SLOTS[slotKey];

  // For medal slots, check if another medal slot already has this item equipped
  if (slot.isMedal) {
    const targetName = items[itemIndex].name;
    ['medal1', 'medal2', 'medal3'].forEach(mKey => {
      if (mKey !== slotKey) {
        const mItems = EQUIPMENT[mKey];
        const equipped = mItems.find(i => i.equipped);
        if (equipped && equipped.name === targetName) {
          // Swap: unequip from that slot
          mItems.forEach(i => i.equipped = false);
          // Equip what we currently have into that slot
          const ourCurrent = items.find(i => i.equipped);
          if (ourCurrent) {
            const match = mItems.find(i => i.name === ourCurrent.name);
            if (match) match.equipped = true;
          }
          // Update that segment
          const otherEquipped = mItems.find(i => i.equipped);
          const otherSeg = document.querySelector(`.segment[data-slot="${mKey}"] .seg-item`);
          if (otherSeg) otherSeg.textContent = otherEquipped ? (otherEquipped.shortName || otherEquipped.name) : '—';
        }
      }
    });
  }

  // Unequip all in this slot
  items.forEach(i => i.equipped = false);
  items[itemIndex].equipped = true;

  // Update segment text
  const seg = document.querySelector(`.segment[data-slot="${slotKey}"] .seg-item`);
  seg.textContent = items[itemIndex].shortName || items[itemIndex].name;

  // Flash effect
  const segEl = document.querySelector(`.segment[data-slot="${slotKey}"]`);
  segEl.classList.add('just-equipped');
  setTimeout(() => segEl.classList.remove('just-equipped'), 500);

  // Refresh
  buildEquippedPanel();
  updateCenterTooltip(slotKey);
}

// ─── EQUIPPED PANEL ───
function buildEquippedPanel() {
  const panel = document.getElementById('equippedPanel');
  let html = '<div class="equipped-panel-title">EQUIPPED</div>';

  Object.keys(SLOTS).forEach(key => {
    const slot = SLOTS[key];
    const equipped = EQUIPMENT[key].find(i => i.equipped);

    html += `
      <div class="eq-slot" data-slot="${key}">
        <div class="eq-slot-label">${slot.label}</div>
        <div class="eq-slot-row">
          <div class="eq-slot-name">${equipped ? equipped.name : '—'}</div>
          <div class="eq-slot-stat">${equipped ? getEquippedStatText(equipped) : ''}</div>
        </div>
      </div>
    `;
  });

  panel.innerHTML = html;
}

// ─── DECK PAGE ───
function buildDeckPage() {
  buildAvailableCards();
  buildCurrentDeck();
  updateDeckStats();
}

function buildAvailableCards() {
  const grid = document.getElementById('availableGrid');
  grid.innerHTML = '';

  AVAILABLE_CARDS.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = 'card-item';
    el.dataset.idx = idx;
    el.innerHTML = `
      <div class="card-name">${card.name}</div>
      <div class="card-cost">${card.pips.map(p => `<span class="cost-pip pip-${p}"></span>`).join('')}</div>
      <div class="card-type">${card.type}</div>
    `;
    el.addEventListener('click', () => addCardToDeck(idx, el));
    grid.appendChild(el);
  });
}

function addCardToDeck(availIdx, el) {
  const card = AVAILABLE_CARDS[availIdx];
  const existing = currentDeck.find(d => d.name === card.name);
  if (existing) {
    existing.count++;
  } else {
    currentDeck.push({
      name: card.name,
      color: card.pips[0],
      pips: card.pips,
      type: card.type,
      count: 1,
      desc: card.desc,
    });
  }

  el.classList.add('added');
  setTimeout(() => el.classList.remove('added'), 400);

  buildCurrentDeck();
  updateDeckStats();
}

function removeOneCard(cardName) {
  const card = currentDeck.find(d => d.name === cardName);
  if (!card) return;

  if (card.count > 1) {
    card.count--;
  } else {
    currentDeck.splice(currentDeck.indexOf(card), 1);
  }

  buildCurrentDeck();
  updateDeckStats();
}

function buildCurrentDeck() {
  const list = document.getElementById('deckList');
  list.innerHTML = '';

  // Sort by color then name
  const colorOrder = { w: 0, r: 1, b: 2, any: 3 };
  const sorted = [...currentDeck].sort((a, b) => {
    const ca = colorOrder[a.color] ?? 3;
    const cb = colorOrder[b.color] ?? 3;
    if (ca !== cb) return ca - cb;
    return a.name.localeCompare(b.name);
  });

  currentDeck.length = 0;
  sorted.forEach(c => currentDeck.push(c));

  // Expand each card into individual instances, but track grouping
  let instanceIdx = 0;
  currentDeck.forEach((card) => {
    for (let i = 0; i < card.count; i++) {
      const el = document.createElement('div');
      el.className = 'deck-card-instance';

      // Determine group position
      if (card.count === 1) {
        el.classList.add('group-single');
      } else if (i === 0) {
        el.classList.add('group-first');
      } else if (i === card.count - 1) {
        el.classList.add('group-last');
      } else {
        el.classList.add('group-middle');
      }

      el.innerHTML = `
        <div class="dci-left">
          <div class="dci-pips">${card.pips.map(p => `<span class="cost-pip pip-${p}"></span>`).join('')}</div>
          <div class="dci-name">${card.name}</div>
        </div>
        <div class="dci-type">${card.type}</div>
      `;
      el.style.animationDelay = `${instanceIdx * 0.02}s`;
      el.addEventListener('click', () => {
        el.classList.add('removing');
        setTimeout(() => removeOneCard(card.name), 200);
      });
      list.appendChild(el);
      instanceIdx++;
    }
  });
}

function updateDeckStats() {
  let total = 0;
  let whites = 0, reds = 0, blacks = 0;

  currentDeck.forEach(card => {
    total += card.count;
    card.pips.forEach(p => {
      if (p === 'w') whites += card.count;
      else if (p === 'r') reds += card.count;
      else if (p === 'b') blacks += card.count;
    });
  });

  document.getElementById('deckCount').innerHTML = `${total}<span>/30</span>`;

  document.getElementById('colorBreakdown').innerHTML = `
    <div class="color-stat">
      <div class="color-dot" style="background: #e0e0e0;"></div>
      <span>${whites}</span>
    </div>
    <div class="color-stat">
      <div class="color-dot" style="background: #a00000;"></div>
      <span>${reds}</span>
    </div>
    <div class="color-stat">
      <div class="color-dot" style="background: #333; border: 1px solid #555;"></div>
      <span>${blacks}</span>
    </div>
  `;
}

// ─── START ───
init();
</script>
</body>
</html>
