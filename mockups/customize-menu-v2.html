<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crusaders30XX - Customize Menu V2</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black-1: #0a0a0a;
  --black-2: #1a1a1a;
  --black-3: #2a2a2a;
  --black-4: #333;
  --white-1: #ffffff;
  --white-2: #f0f0f0;
  --white-3: #e0e0e0;
  --red-1: #8b0000;
  --red-2: #a00000;
  --red-3: #c41e3a;
  --red-glow: rgba(196, 30, 58, 0.4);
  --transition-fast: 0.15s ease;
  --transition-med: 0.25s ease;
  --transition-slow: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--black-1);
  color: var(--white-2);
  overflow: hidden;
  height: 100vh;
  user-select: none;
}

h1, h2, h3, h4 { font-family: 'Oswald', sans-serif; }

/* ─── LAYOUT ─── */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ─── HEADER BAR ─── */
.header-bar {
  background: var(--black-2);
  padding: 0 24px;
  display: flex;
  justify-content: space-between;
  align-items: stretch;
  border-bottom: 2px solid var(--red-2);
  height: 56px;
  flex-shrink: 0;
  position: relative;
  z-index: 100;
}

.header-bar::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--red-glow), transparent);
}

.nav-tabs {
  display: flex;
  gap: 4px;
  align-items: stretch;
}

.nav-tab {
  padding: 0 36px;
  background: var(--black-3);
  color: var(--white-3);
  cursor: pointer;
  font-family: 'Oswald', sans-serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 2px;
  clip-path: polygon(12% 0, 100% 0, 88% 100%, 0 100%);
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 140px;
}

.nav-tab:hover {
  background: var(--black-4);
  color: var(--white-1);
}

.nav-tab.active {
  background: var(--red-2);
  color: var(--white-1);
}

.exit-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 28px;
  cursor: pointer;
  font-family: 'Oswald', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--white-3);
  transition: all var(--transition-fast);
  position: relative;
}

.exit-btn::before {
  content: '';
  position: absolute;
  left: 0;
  top: 25%;
  bottom: 25%;
  width: 1px;
  background: var(--black-4);
}

.exit-btn:hover {
  color: var(--red-3);
}

.exit-btn .key-hint {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  border: 1px solid var(--black-4);
  border-radius: 4px;
  font-size: 11px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  color: #666;
  background: var(--black-1);
}

/* ─── MAIN CONTENT ─── */
.main-content {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.page {
  display: none;
  height: 100%;
}

.page.active {
  display: flex;
}

/* ════════════════════════════════════════════════
   LOADOUT PAGE
   ════════════════════════════════════════════════ */
.loadout-page {
  position: relative;
}

/* Subtle background texture */
.loadout-page::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 50%, rgba(160, 0, 0, 0.03) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.008) 40px, rgba(255,255,255,0.008) 41px);
  pointer-events: none;
}

/* ─── WHEEL CONTAINER ─── */
.wheel-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.wheel {
  width: 450px;
  height: 450px;
  position: relative;
  flex-shrink: 0;
}

/* Decorative ring behind wheel */
.wheel::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 380px;
  height: 380px;
  border-radius: 50%;
  border: 1px solid rgba(160, 0, 0, 0.15);
  pointer-events: none;
}

.wheel::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 320px;
  height: 320px;
  border-radius: 50%;
  border: 1px dashed rgba(255, 255, 255, 0.04);
  pointer-events: none;
}

/* ─── CENTER HUB ─── */
.wheel-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 150px;
  height: 150px;
  background: var(--black-2);
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 3px solid var(--red-2);
  z-index: 10;
  transition: border-color var(--transition-med);
  box-shadow:
    0 0 30px rgba(160, 0, 0, 0.2),
    inset 0 0 20px rgba(0, 0, 0, 0.5);
}

.wheel-center.has-hover {
  border-color: var(--red-3);
  box-shadow:
    0 0 40px rgba(196, 30, 58, 0.3),
    inset 0 0 20px rgba(0, 0, 0, 0.5);
}

.center-slot-label {
  font-family: 'Oswald', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  color: #666;
  text-transform: uppercase;
  margin-bottom: 4px;
  transition: color var(--transition-fast);
}

.center-item-name {
  font-family: 'Oswald', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--white-1);
  text-align: center;
  line-height: 1.2;
  padding: 0 12px;
  transition: all var(--transition-fast);
}

.center-item-stat {
  font-size: 13px;
  font-weight: 600;
  color: var(--red-3);
  margin-top: 4px;
  transition: all var(--transition-fast);
}

/* ─── WHEEL SEGMENTS ─── */
.segment {
  position: absolute;
  padding: 12px 16px;
  background: var(--black-3);
  cursor: pointer;
  transition: all var(--transition-med);
  border: 2px solid var(--black-4);
  text-align: center;
  min-width: 120px;
  clip-path: polygon(8% 0, 100% 0, 92% 100%, 0 100%);
}

.segment:hover,
.segment.hovered {
  background: var(--black-2);
  border-color: var(--red-2);
  box-shadow: 0 0 20px rgba(160, 0, 0, 0.25);
  transform-origin: center;
}

.segment.active-slot {
  background: var(--red-2);
  border-color: var(--red-3);
  box-shadow: 0 0 25px rgba(196, 30, 58, 0.4);
}

.segment .seg-label {
  font-family: 'Oswald', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  color: #888;
  text-transform: uppercase;
  margin-bottom: 3px;
}

.segment.active-slot .seg-label,
.segment.hovered .seg-label {
  color: rgba(255, 255, 255, 0.7);
}

.segment .seg-item {
  font-family: 'Oswald', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--white-1);
  white-space: nowrap;
}

/* Segment positions - arranged around the wheel */
.seg-n   { top: -10px;  left: 50%; transform: translateX(-50%); }
.seg-ne  { top: 55px;   right: -15px; }
.seg-e   { top: 50%;    right: -30px; transform: translateY(-50%); }
.seg-se  { bottom: 55px; right: -15px; }
.seg-s   { bottom: -10px; left: 50%; transform: translateX(-50%); }
.seg-sw  { bottom: 55px; left: -15px; }
.seg-w   { top: 50%;    left: -30px; transform: translateY(-50%); }

/* ─── DIRECTIONAL TOOLTIP MENUS ─── */
.dir-tooltip {
  position: absolute;
  width: 260px;
  background: var(--black-2);
  border: 1px solid var(--black-4);
  border-left: 3px solid var(--red-2);
  padding: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition-med), transform var(--transition-slow);
  z-index: 50;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
}

.dir-tooltip.visible {
  opacity: 1;
  pointer-events: auto;
}

/* Tooltip positions - offset from wheel in the same direction */
.tooltip-n   { bottom: calc(100% + 30px); left: 50%; transform: translateX(-50%) translateY(8px); }
.tooltip-n.visible { transform: translateX(-50%) translateY(0); }

.tooltip-ne  { bottom: calc(100% - 30px); left: calc(100% - 20px); transform: translateY(8px); }
.tooltip-ne.visible { transform: translateY(0); }

.tooltip-e   { top: 50%; left: calc(100% + 30px); transform: translateY(-50%) translateX(-8px); }
.tooltip-e.visible { transform: translateY(-50%) translateX(0); }

.tooltip-se  { top: calc(100% - 30px); left: calc(100% - 20px); transform: translateY(-8px); }
.tooltip-se.visible { transform: translateY(0); }

.tooltip-s   { top: calc(100% + 30px); left: 50%; transform: translateX(-50%) translateY(-8px); }
.tooltip-s.visible { transform: translateX(-50%) translateY(0); }

.tooltip-sw  { top: calc(100% - 30px); right: calc(100% - 20px); transform: translateY(-8px); }
.tooltip-sw.visible { transform: translateY(0); }

.tooltip-w   { top: 50%; right: calc(100% + 30px); transform: translateY(-50%) translateX(8px); }
.tooltip-w.visible { transform: translateY(-50%) translateX(0); }

.tooltip-header {
  padding: 10px 14px;
  background: var(--black-1);
  border-bottom: 1px solid var(--black-4);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.tooltip-header-label {
  font-family: 'Oswald', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--red-3);
  text-transform: uppercase;
}

.tooltip-key-hints {
  display: flex;
  gap: 4px;
  align-items: center;
  font-size: 11px;
  color: #555;
}

.tooltip-key-hints .k {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 20px;
  height: 18px;
  padding: 0 4px;
  background: var(--black-3);
  border: 1px solid var(--black-4);
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
  color: #777;
}

.tooltip-items {
  padding: 6px 0;
  max-height: 220px;
  overflow-y: auto;
}

.tooltip-item {
  padding: 10px 14px;
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-left: 3px solid transparent;
  margin-left: -3px;
}

.tooltip-item:hover {
  background: var(--black-3);
}

.tooltip-item.browsed {
  background: rgba(160, 0, 0, 0.15);
  border-left-color: var(--red-3);
}

.tooltip-item.equipped {
  background: rgba(160, 0, 0, 0.08);
}

.tooltip-item .ti-name {
  font-weight: 700;
  font-size: 15px;
  color: var(--white-1);
}

.tooltip-item .ti-stat {
  font-size: 13px;
  font-weight: 600;
  color: var(--red-3);
}

.tooltip-item .ti-desc {
  font-size: 11px;
  color: #777;
  font-style: italic;
}

.tooltip-item .ti-equipped-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--red-3);
  text-transform: uppercase;
  padding: 2px 6px;
  border: 1px solid var(--red-2);
  border-radius: 2px;
}

.tooltip-item .ti-left {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.tooltip-footer {
  padding: 8px 14px;
  background: var(--black-1);
  border-top: 1px solid var(--black-4);
  display: flex;
  justify-content: center;
  gap: 12px;
  font-size: 11px;
  color: #555;
}

.tooltip-footer .k {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 16px;
  padding: 0 3px;
  background: var(--black-3);
  border: 1px solid var(--black-4);
  border-radius: 2px;
  font-size: 9px;
  font-weight: 700;
  color: #777;
  margin: 0 3px;
}

/* ─── EQUIPPED OVERVIEW PANEL (right side) ─── */
.equipped-panel {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 240px;
  background: var(--black-2);
  border-left: 1px solid var(--black-4);
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  z-index: 5;
}

.equipped-panel-title {
  font-family: 'Oswald', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 3px;
  color: #666;
  text-transform: uppercase;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--black-4);
}

.eq-slot {
  padding: 8px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.03);
  transition: all var(--transition-fast);
}

.eq-slot.highlighted {
  background: rgba(160, 0, 0, 0.08);
  margin: 0 -20px;
  padding: 8px 20px;
  border-left: 2px solid var(--red-3);
}

.eq-slot-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  color: #555;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.eq-slot-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.eq-slot-name {
  font-weight: 700;
  font-size: 14px;
  color: var(--white-2);
}

.eq-slot-stat {
  font-size: 12px;
  font-weight: 600;
  color: var(--red-3);
}

/* ════════════════════════════════════════════════
   DECK PAGE
   ════════════════════════════════════════════════ */
.deck-page {
  flex-direction: column;
}

/* Deck Stats Bar */
.deck-stats-bar {
  background: var(--black-2);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  gap: 28px;
  border-bottom: 1px solid var(--black-4);
  flex-shrink: 0;
}

.deck-count {
  font-family: 'Oswald', sans-serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--white-1);
  letter-spacing: 1px;
}

.deck-count span {
  color: #555;
  font-size: 20px;
}

.color-breakdown {
  display: flex;
  gap: 16px;
  align-items: center;
}

.color-stat {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
  font-size: 15px;
}

.color-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
}

.deck-label {
  font-family: 'Oswald', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  color: #555;
  text-transform: uppercase;
}

/* Deck Main Area */
.deck-main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Available Cards (Left) */
.deck-available {
  flex: 1;
  padding: 24px 28px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.section-title {
  font-family: 'Oswald', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--white-1);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--black-4);
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.card-item {
  background: var(--black-3);
  padding: 14px;
  border-radius: 3px;
  cursor: pointer;
  transition: all var(--transition-med);
  border: 2px solid transparent;
  position: relative;
}

.card-item:hover {
  border-color: var(--red-2);
  background: var(--black-2);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
}

.card-item.added {
  border-color: #4caf50;
  background: rgba(76, 175, 80, 0.05);
}

.card-item .card-name {
  font-weight: 700;
  font-size: 15px;
  margin-bottom: 6px;
  color: var(--white-1);
}

.card-item .card-cost {
  margin-bottom: 6px;
  display: flex;
  gap: 3px;
}

.card-item .card-type {
  font-size: 11px;
  color: #777;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.cost-pip {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
}

.pip-w { background: #e0e0e0; }
.pip-r { background: #a00000; }
.pip-b { background: #333; border-color: #555; }
.pip-any { background: #888; }

/* Current Deck (Right) */
.deck-current {
  width: 380px;
  background: var(--black-2);
  border-left: 1px solid var(--black-4);
  padding: 24px 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.deck-current .section-title {
  font-size: 16px;
}

.deck-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* Grouped card in current deck */
.deck-card-group {
  background: var(--black-3);
  border-radius: 3px;
  border-left: 3px solid var(--red-2);
  padding: 10px 14px;
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.deck-card-group:hover {
  background: var(--black-1);
  transform: translateX(-4px);
}

.deck-card-group.removing {
  opacity: 0.5;
  transform: translateX(-10px);
}

.dcg-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.dcg-pips {
  display: flex;
  gap: 3px;
}

.dcg-name {
  font-weight: 700;
  font-size: 14px;
  color: var(--white-1);
}

.dcg-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.dcg-type {
  font-size: 10px;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.dcg-count {
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--red-3);
  background: var(--black-1);
  width: 28px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 3px;
  border: 1px solid var(--black-4);
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--black-1); }
::-webkit-scrollbar-thumb { background: var(--black-4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #555; }

/* ─── Animations ─── */
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 20px rgba(160, 0, 0, 0.2); }
  50% { box-shadow: 0 0 30px rgba(196, 30, 58, 0.35); }
}

@keyframes fade-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.deck-card-group {
  animation: fade-in 0.2s ease forwards;
}

/* Flash effect for equip */
@keyframes equip-flash {
  0% { background: rgba(196, 30, 58, 0.3); }
  100% { background: transparent; }
}

.segment.just-equipped {
  animation: equip-flash 0.5s ease;
}

/* ─── Responsive center ─── */
.wheel-container {
  padding-right: 240px; /* offset for equipped panel */
}
</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <div class="header-bar">
    <div class="nav-tabs">
      <div class="nav-tab active" data-page="loadout">LOADOUT</div>
      <div class="nav-tab" data-page="deck">DECK</div>
    </div>
    <div class="exit-btn" id="exitBtn">
      <span class="key-hint">ESC</span>
      EXIT
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <!-- ═══ LOADOUT PAGE ═══ -->
    <div class="page loadout-page active" id="page-loadout">
      <div class="wheel-container">
        <div class="wheel" id="wheel">
          <!-- Center Hub -->
          <div class="wheel-center" id="wheelCenter">
            <div class="center-slot-label" id="centerLabel">LOADOUT</div>
            <div class="center-item-name" id="centerName">Hover a slot</div>
            <div class="center-item-stat" id="centerStat"></div>
          </div>

          <!-- Segments will be generated by JS -->
        </div>
      </div>

      <!-- Equipped Overview Panel -->
      <div class="equipped-panel" id="equippedPanel">
        <div class="equipped-panel-title">EQUIPPED</div>
        <!-- Generated by JS -->
      </div>
    </div>

    <!-- ═══ DECK PAGE ═══ -->
    <div class="page deck-page" id="page-deck">
      <!-- Deck Stats -->
      <div class="deck-stats-bar">
        <div class="deck-label">DECK COMPOSITION</div>
        <div class="deck-count" id="deckCount">14<span>/30</span></div>
        <div class="color-breakdown" id="colorBreakdown">
          <!-- Generated by JS -->
        </div>
      </div>

      <div class="deck-main">
        <!-- Available Cards -->
        <div class="deck-available">
          <div class="section-title">AVAILABLE CARDS</div>
          <div class="card-grid" id="availableGrid">
            <!-- Generated by JS -->
          </div>
        </div>

        <!-- Current Deck -->
        <div class="deck-current">
          <div class="section-title">CURRENT DECK</div>
          <div class="deck-list" id="deckList">
            <!-- Generated by JS -->
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════

const SLOTS = {
  weapon:     { label: 'WEAPON',     dir: 'n',  statKey: 'ATK' },
  head:       { label: 'HEAD',       dir: 'ne', statKey: 'DEF' },
  chest:      { label: 'CHEST',      dir: 'e',  statKey: 'DEF' },
  arms:       { label: 'ARMS',       dir: 'se', statKey: 'DEF' },
  legs:       { label: 'LEGS',       dir: 's',  statKey: 'DEF' },
  temperance: { label: 'TEMPERANCE', dir: 'sw', statKey: null },
  medals:     { label: 'MEDALS',     dir: 'w',  statKey: null },
};

const EQUIPMENT = {
  weapon: [
    { name: 'Crimson Edge',   stat: 'ATK: 12', desc: 'Strikes twice when combo > 3', equipped: true },
    { name: 'Iron Mace',      stat: 'ATK: 8',  desc: 'Stuns on critical hit' },
    { name: 'Shadow Dagger',  stat: 'ATK: 6',  desc: 'Ignores 2 block' },
    { name: 'Holy Lance',     stat: 'ATK: 15', desc: 'Bonus damage to undead' },
  ],
  head: [
    { name: 'Crusader Helm',  stat: 'DEF: 4',  desc: 'Reduce status duration by 1', equipped: true },
    { name: 'Wizard Hood',    stat: 'DEF: 1',  desc: '+1 Any mana' },
    { name: 'Steel Visor',    stat: 'DEF: 5',  desc: 'No special effect' },
  ],
  chest: [
    { name: 'Plate Cuirass',  stat: 'DEF: 8',  desc: 'Block +2 per turn', equipped: true },
    { name: 'Leather Vest',   stat: 'DEF: 4',  desc: 'Evade 10%' },
    { name: 'Robe of Warding',stat: 'DEF: 2',  desc: 'Magic resist +3' },
  ],
  arms: [
    { name: 'Gauntlets of Fury', stat: 'DEF: 3', desc: '+1 Red mana per turn', equipped: true },
    { name: 'Vambraces',         stat: 'DEF: 4', desc: 'No special effect' },
    { name: 'Gloves of Precision', stat: 'DEF: 2', desc: 'Crit +5%' },
  ],
  legs: [
    { name: 'Greaves of Haste',  stat: 'DEF: 3', desc: '+1 card draw per turn', equipped: true },
    { name: 'Boots of Stability', stat: 'DEF: 4', desc: "Can't be knocked back" },
    { name: 'Sandals of Speed',   stat: 'DEF: 1', desc: 'Act first' },
  ],
  temperance: [
    { name: 'Balanced Spirit',   stat: '1 each mana',   desc: 'Start with 1 of each color', equipped: true },
    { name: 'Aggressive Spirit', stat: '3 Red mana',    desc: 'Start with 3 Red mana' },
    { name: 'Defensive Spirit',  stat: '2 Block/turn',  desc: 'Start with 2 Block per turn' },
  ],
  medals: [
    { name: "Veteran's Badge", stat: 'XP +10%',         desc: 'Gain bonus experience', equipped: true },
    { name: 'Lucky Coin',      stat: '+5% rare drops',  desc: 'Better loot chances', equipped: true },
    { name: 'Iron Will',       stat: 'Resist debuff',   desc: 'Resist first debuff each combat', equipped: true },
    { name: "Scout's Mark",    stat: 'See enemy deck',  desc: 'Preview enemy cards' },
    { name: "Healer's Sigil",  stat: 'Heal 2 post-combat', desc: 'Recover after fights' },
    { name: 'Berserker Token', stat: 'ATK+3, DEF-2',   desc: 'Glass cannon build' },
  ],
};

const CURRENT_DECK = [
  { name: 'Shield Bash',   color: 'w', pips: ['w'],       type: 'Defense',   count: 2, desc: 'Block: 5. Draw if already blocking.' },
  { name: 'Flame Strike',  color: 'r', pips: ['r','r'],   type: 'Attack',    count: 2, desc: 'Damage: 8. Burn for 2.' },
  { name: 'Dark Pact',     color: 'b', pips: ['b'],       type: 'Skill',     count: 1, desc: 'Damage: 4. Lose 2 HP. Draw 2.' },
  { name: 'Holy Light',    color: 'w', pips: ['w','any'],  type: 'Spell',     count: 1, desc: 'Heal: 6. Cleanse 1 debuff.' },
  { name: 'Crimson Fury',  color: 'r', pips: ['r','r','r'],type: 'Attack',   count: 1, desc: 'Damage: 15. Exhaust.' },
  { name: 'Shadow Step',   color: 'b', pips: ['b'],       type: 'Skill',     count: 2, desc: 'Block: 3. Next attack ignores block.' },
  { name: 'Divine Shield', color: 'w', pips: ['w','w'],   type: 'Defense',   count: 1, desc: 'Block: 10. Immune this turn.' },
  { name: 'Blood Price',   color: 'b', pips: ['b','b','r'],type: 'Attack',   count: 1, desc: 'Sacrifice 5 HP. Damage all.' },
  { name: 'Parry',         color: 'any',pips: ['any'],     type: 'Defense',   count: 1, desc: 'Block: 4. Counter for 3.' },
  { name: 'Healing Prayer',color: 'w', pips: ['w'],       type: 'Spell',     count: 1, desc: 'Heal: 4. Gain 1 block.' },
  { name: 'Inferno',       color: 'r', pips: ['r','r','any'],type: 'Attack', count: 1, desc: 'Burn all enemies for 3.' },
  { name: 'Void Embrace',  color: 'b', pips: ['b','b'],   type: 'Skill',     count: 1, desc: 'Draw 3 cards. Discard 1.' },
];

const AVAILABLE_CARDS = [
  { name: 'Smite',       pips: ['w','r'],     type: 'Attack',  desc: 'Damage: 6. Bonus if burning.' },
  { name: 'Fortify',     pips: ['w','w'],      type: 'Defense', desc: 'Block: 8. Persists next turn.' },
  { name: 'Leech',       pips: ['b','b'],      type: 'Skill',   desc: 'Damage: 5. Heal for damage.' },
  { name: 'Whirlwind',   pips: ['r','any'],    type: 'Attack',  desc: 'Damage: 4. Hit all enemies.' },
  { name: 'Sanctuary',   pips: ['w','w','w'],  type: 'Defense', desc: 'Block: 6. Immune to debuffs.' },
  { name: 'Backstab',    pips: ['b'],          type: 'Attack',  desc: "Damage: 7. Double if enemy hasn't acted." },
  { name: 'Mana Surge',  pips: ['any'],        type: 'Skill',   desc: 'Gain 2 mana any color. FREE.' },
  { name: 'Retribution', pips: ['r','w'],      type: 'Attack',  desc: 'Damage: 5. Block: 5.' },
];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════

let activeSlot = null;     // which slot tooltip is open
let browseIndex = {};      // per-slot browse index
let currentDeck = JSON.parse(JSON.stringify(CURRENT_DECK));

// Initialize browse indices to equipped items
Object.keys(EQUIPMENT).forEach(slot => {
  const eqIdx = EQUIPMENT[slot].findIndex(i => i.equipped);
  browseIndex[slot] = eqIdx >= 0 ? eqIdx : 0;
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════

function init() {
  buildWheel();
  buildEquippedPanel();
  buildDeckPage();
  bindNavTabs();
  bindKeyboard();
}

// ─── NAV TABS ───
function bindNavTabs() {
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`page-${tab.dataset.page}`).classList.add('active');
      if (tab.dataset.page === 'loadout') closeAllTooltips();
    });
  });
}

// ─── BUILD WHEEL ───
function buildWheel() {
  const wheel = document.getElementById('wheel');
  const slotKeys = Object.keys(SLOTS);

  slotKeys.forEach(key => {
    const slot = SLOTS[key];
    const equipped = EQUIPMENT[key].find(i => i.equipped);

    // Segment
    const seg = document.createElement('div');
    seg.className = `segment seg-${slot.dir}`;
    seg.dataset.slot = key;
    seg.innerHTML = `
      <div class="seg-label">${slot.label}</div>
      <div class="seg-item">${equipped ? equipped.name : '—'}</div>
    `;
    wheel.appendChild(seg);

    // Tooltip
    const tt = document.createElement('div');
    tt.className = `dir-tooltip tooltip-${slot.dir}`;
    tt.dataset.slot = key;
    tt.innerHTML = buildTooltipHTML(key);
    wheel.appendChild(tt);

    // Segment events
    seg.addEventListener('mouseenter', () => onSegmentHover(key));
    seg.addEventListener('mouseleave', () => onSegmentLeave(key));
    seg.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleTooltip(key);
    });
  });

  // Click outside closes tooltip
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.dir-tooltip') && !e.target.closest('.segment')) {
      closeAllTooltips();
    }
  });
}

function buildTooltipHTML(slotKey) {
  const items = EQUIPMENT[slotKey];
  const slot = SLOTS[slotKey];
  let html = `
    <div class="tooltip-header">
      <span class="tooltip-header-label">${slot.label}</span>
      <div class="tooltip-key-hints">
        <span class="k">A</span><span class="k">D</span> browse
      </div>
    </div>
    <div class="tooltip-items">
  `;

  items.forEach((item, idx) => {
    const isBrowsed = idx === browseIndex[slotKey];
    const isEquipped = item.equipped;
    html += `
      <div class="tooltip-item${isBrowsed ? ' browsed' : ''}${isEquipped ? ' equipped' : ''}"
           data-slot="${slotKey}" data-idx="${idx}">
        <div class="ti-left">
          <div class="ti-name">${item.name}</div>
          <div class="ti-desc">${item.desc}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
          <div class="ti-stat">${item.stat}</div>
          ${isEquipped ? '<div class="ti-equipped-badge">EQUIPPED</div>' : ''}
        </div>
      </div>
    `;
  });

  html += `
    </div>
    <div class="tooltip-footer">
      <span class="k">A</span><span class="k">D</span> Browse
      <span class="k">SPACE</span> Equip
    </div>
  `;
  return html;
}

function refreshTooltip(slotKey) {
  const tt = document.querySelector(`.dir-tooltip[data-slot="${slotKey}"]`);
  if (tt) tt.innerHTML = buildTooltipHTML(slotKey);
}

// ─── SEGMENT HOVER ───
function onSegmentHover(slotKey) {
  const seg = document.querySelector(`.segment[data-slot="${slotKey}"]`);
  seg.classList.add('hovered');

  const center = document.getElementById('wheelCenter');
  center.classList.add('has-hover');

  const equipped = EQUIPMENT[slotKey].find(i => i.equipped);
  document.getElementById('centerLabel').textContent = SLOTS[slotKey].label;
  document.getElementById('centerName').textContent = equipped ? equipped.name : '—';
  document.getElementById('centerStat').textContent = equipped ? equipped.stat : '';

  // Highlight in equipped panel
  const eqSlot = document.querySelector(`.eq-slot[data-slot="${slotKey}"]`);
  if (eqSlot) eqSlot.classList.add('highlighted');
}

function onSegmentLeave(slotKey) {
  const seg = document.querySelector(`.segment[data-slot="${slotKey}"]`);
  seg.classList.remove('hovered');

  if (!activeSlot) {
    const center = document.getElementById('wheelCenter');
    center.classList.remove('has-hover');
    document.getElementById('centerLabel').textContent = 'LOADOUT';
    document.getElementById('centerName').textContent = 'Hover a slot';
    document.getElementById('centerStat').textContent = '';
  }

  const eqSlot = document.querySelector(`.eq-slot[data-slot="${slotKey}"]`);
  if (eqSlot) eqSlot.classList.remove('highlighted');
}

// ─── TOOLTIPS ───
function toggleTooltip(slotKey) {
  if (activeSlot === slotKey) {
    closeAllTooltips();
  } else {
    closeAllTooltips();
    openTooltip(slotKey);
  }
}

function openTooltip(slotKey) {
  activeSlot = slotKey;
  const tt = document.querySelector(`.dir-tooltip[data-slot="${slotKey}"]`);
  const seg = document.querySelector(`.segment[data-slot="${slotKey}"]`);
  tt.classList.add('visible');
  seg.classList.add('active-slot');

  // Update center to show browsed item
  updateCenterFromBrowse(slotKey);

  // Highlight equipped panel
  const eqSlot = document.querySelector(`.eq-slot[data-slot="${slotKey}"]`);
  if (eqSlot) eqSlot.classList.add('highlighted');
}

function closeAllTooltips() {
  document.querySelectorAll('.dir-tooltip').forEach(tt => tt.classList.remove('visible'));
  document.querySelectorAll('.segment').forEach(s => s.classList.remove('active-slot'));
  document.querySelectorAll('.eq-slot').forEach(s => s.classList.remove('highlighted'));

  if (activeSlot) {
    const center = document.getElementById('wheelCenter');
    center.classList.remove('has-hover');
    document.getElementById('centerLabel').textContent = 'LOADOUT';
    document.getElementById('centerName').textContent = 'Hover a slot';
    document.getElementById('centerStat').textContent = '';
  }
  activeSlot = null;
}

function updateCenterFromBrowse(slotKey) {
  const items = EQUIPMENT[slotKey];
  const idx = browseIndex[slotKey];
  const item = items[idx];

  document.getElementById('centerLabel').textContent = SLOTS[slotKey].label;
  document.getElementById('centerName').textContent = item.name;
  document.getElementById('centerStat').textContent = item.stat;

  const center = document.getElementById('wheelCenter');
  center.classList.add('has-hover');
}

// ─── KEYBOARD CONTROLS ───
function bindKeyboard() {
  document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();

    // ESC to close tooltip or exit
    if (key === 'escape') {
      if (activeSlot) {
        closeAllTooltips();
      }
      return;
    }

    if (!activeSlot) return;

    const items = EQUIPMENT[activeSlot];

    // A/D or ArrowLeft/ArrowRight to browse
    if (key === 'a' || key === 'arrowleft') {
      e.preventDefault();
      browseIndex[activeSlot] = (browseIndex[activeSlot] - 1 + items.length) % items.length;
      refreshTooltip(activeSlot);
      updateCenterFromBrowse(activeSlot);
      // Re-open to keep visible
      const tt = document.querySelector(`.dir-tooltip[data-slot="${activeSlot}"]`);
      tt.classList.add('visible');
    }

    if (key === 'd' || key === 'arrowright') {
      e.preventDefault();
      browseIndex[activeSlot] = (browseIndex[activeSlot] + 1) % items.length;
      refreshTooltip(activeSlot);
      updateCenterFromBrowse(activeSlot);
      const tt = document.querySelector(`.dir-tooltip[data-slot="${activeSlot}"]`);
      tt.classList.add('visible');
    }

    // Space to equip
    if (key === ' ') {
      e.preventDefault();
      equipItem(activeSlot, browseIndex[activeSlot]);
    }
  });
}

function equipItem(slotKey, itemIndex) {
  const items = EQUIPMENT[slotKey];

  // Unequip all in this slot
  items.forEach(i => i.equipped = false);

  // For medals, handle multi-equip differently - just toggle this one
  if (slotKey === 'medals') {
    // Simple: equip the selected one (for prototype, just mark it)
    items[itemIndex].equipped = true;
  } else {
    items[itemIndex].equipped = true;
  }

  // Update segment text
  const seg = document.querySelector(`.segment[data-slot="${slotKey}"] .seg-item`);
  seg.textContent = items[itemIndex].name;

  // Flash effect
  const segEl = document.querySelector(`.segment[data-slot="${slotKey}"]`);
  segEl.classList.add('just-equipped');
  setTimeout(() => segEl.classList.remove('just-equipped'), 500);

  // Refresh tooltip and panel
  refreshTooltip(slotKey);
  const tt = document.querySelector(`.dir-tooltip[data-slot="${slotKey}"]`);
  tt.classList.add('visible');
  buildEquippedPanel();
  updateCenterFromBrowse(slotKey);
}

// ─── EQUIPPED PANEL ───
function buildEquippedPanel() {
  const panel = document.getElementById('equippedPanel');
  let html = '<div class="equipped-panel-title">EQUIPPED</div>';

  Object.keys(SLOTS).forEach(key => {
    const slot = SLOTS[key];
    const equipped = EQUIPMENT[key].filter(i => i.equipped);

    if (key === 'medals') {
      equipped.forEach(item => {
        html += `
          <div class="eq-slot" data-slot="${key}">
            <div class="eq-slot-label">${slot.label}</div>
            <div class="eq-slot-row">
              <div class="eq-slot-name">${item.name}</div>
              <div class="eq-slot-stat">${item.stat}</div>
            </div>
          </div>
        `;
      });
    } else {
      const item = equipped[0];
      html += `
        <div class="eq-slot" data-slot="${key}">
          <div class="eq-slot-label">${slot.label}</div>
          <div class="eq-slot-row">
            <div class="eq-slot-name">${item ? item.name : '—'}</div>
            <div class="eq-slot-stat">${item ? item.stat : ''}</div>
          </div>
        </div>
      `;
    }
  });

  panel.innerHTML = html;
}

// ─── DECK PAGE ───
function buildDeckPage() {
  buildAvailableCards();
  buildCurrentDeck();
  updateDeckStats();
}

function buildAvailableCards() {
  const grid = document.getElementById('availableGrid');
  grid.innerHTML = '';

  AVAILABLE_CARDS.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = 'card-item';
    el.dataset.idx = idx;
    el.innerHTML = `
      <div class="card-name">${card.name}</div>
      <div class="card-cost">${card.pips.map(p => `<span class="cost-pip pip-${p}"></span>`).join('')}</div>
      <div class="card-type">${card.type}</div>
    `;
    el.addEventListener('click', () => addCardToDeck(idx, el));
    grid.appendChild(el);
  });
}

function addCardToDeck(availIdx, el) {
  const card = AVAILABLE_CARDS[availIdx];

  // Check if card already in deck
  const existing = currentDeck.find(d => d.name === card.name);
  if (existing) {
    existing.count++;
  } else {
    currentDeck.push({
      name: card.name,
      color: card.pips[0],
      pips: card.pips,
      type: card.type,
      count: 1,
      desc: card.desc,
    });
  }

  // Visual feedback
  el.classList.add('added');
  setTimeout(() => el.classList.remove('added'), 400);

  buildCurrentDeck();
  updateDeckStats();
}

function removeCardFromDeck(deckIdx) {
  const card = currentDeck[deckIdx];
  const el = document.querySelectorAll('.deck-card-group')[deckIdx];

  if (card.count > 1) {
    card.count--;
  } else {
    currentDeck.splice(deckIdx, 1);
  }

  if (el) {
    el.classList.add('removing');
    setTimeout(() => {
      buildCurrentDeck();
      updateDeckStats();
    }, 200);
  } else {
    buildCurrentDeck();
    updateDeckStats();
  }
}

function buildCurrentDeck() {
  const list = document.getElementById('deckList');
  list.innerHTML = '';

  // Sort: by color (w, r, b, any), then by name
  const colorOrder = { w: 0, r: 1, b: 2, any: 3 };
  const sorted = [...currentDeck].sort((a, b) => {
    const ca = colorOrder[a.color] ?? 3;
    const cb = colorOrder[b.color] ?? 3;
    if (ca !== cb) return ca - cb;
    return a.name.localeCompare(b.name);
  });

  // Rebuild currentDeck in sorted order for index alignment
  currentDeck.length = 0;
  sorted.forEach(c => currentDeck.push(c));

  currentDeck.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = 'deck-card-group';
    el.innerHTML = `
      <div class="dcg-left">
        <div class="dcg-pips">${card.pips.map(p => `<span class="cost-pip pip-${p}"></span>`).join('')}</div>
        <div class="dcg-name">${card.name}</div>
      </div>
      <div class="dcg-right">
        <div class="dcg-type">${card.type}</div>
        ${card.count > 1 ? `<div class="dcg-count">x${card.count}</div>` : '<div class="dcg-count">x1</div>'}
      </div>
    `;
    el.style.animationDelay = `${idx * 0.03}s`;
    el.addEventListener('click', () => removeCardFromDeck(idx));
    list.appendChild(el);
  });
}

function updateDeckStats() {
  let total = 0;
  let whites = 0, reds = 0, blacks = 0;

  currentDeck.forEach(card => {
    total += card.count;
    card.pips.forEach(p => {
      if (p === 'w') whites += card.count;
      else if (p === 'r') reds += card.count;
      else if (p === 'b') blacks += card.count;
    });
  });

  document.getElementById('deckCount').innerHTML = `${total}<span>/30</span>`;

  document.getElementById('colorBreakdown').innerHTML = `
    <div class="color-stat">
      <div class="color-dot" style="background: #e0e0e0;"></div>
      <span>${whites}</span>
    </div>
    <div class="color-stat">
      <div class="color-dot" style="background: #a00000;"></div>
      <span>${reds}</span>
    </div>
    <div class="color-stat">
      <div class="color-dot" style="background: #333; border: 1px solid #555;"></div>
      <span>${blacks}</span>
    </div>
  `;
}

// ─── START ───
init();
</script>
</body>
</html>
